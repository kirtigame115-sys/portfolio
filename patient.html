<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .blur {
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-lg-6 shadow border">
                <h3>Patient registration Form</h3>
                <p class="blur">Please fill in your details to register as a new patient</p>
                <form action="">
                    <div class="row">
                        <div class="col-lg-6 mb-3">
                            <label for="">First Name</label>
                            <input type="text" class="blur" value="Enter your first name" name="" id="" class="form-control">
                        </div>
                        <div class="col-lg-6  mb-3">
                            <label for="">Last Name</label>
                            <input type="text" class="blur" value="Enter your last name" name="" id="" class="form-control">
                        </div>

                        <div class="col-lg-6 mb-3">
                            <label for="">Date of Birth</label>
                            <input type="number" class="blur" value="DD.MM.YYYY" name="" id="" class="form-control" placeholder="DD.MM.YYYY">
                        </div>
                         <div class="col-lg-12 mb-3">
                        <tr>
                            <td>
                                <label for="">Gender</label>
                            </td>
                        </div>
                        <div>
                        
                            <td>
                                <input type="radio" name="Gender">male
                                <input type="radio" name="Gender">female
                                <input type="radio" name="Gender">other
                            </td>
                        </tr>
                    
                        </div>
                        <div class="col-lg-12  mb-3">
                            <label for="">Email Address</label>
                            <input type="email" name="" id="" class="form-control" placeholder="Enter your email">
                        </div>

                        <div class="col-lg-12  mb-3">
                            <label for="">Phone Number</label>
                            <input type="number" name="" id="" class="form-control" placeholder="+1(555)123-4567">
                        </div> 

                         <div class="col-lg-12  mb-3">
                            <label for=""> Address</label>
                            <input type="text" name="" id="" class="form-control" placeholder="Enter your address here">
                        </div>
                        
                          <div class="col-lg-12  mb-3">
                            <label for="">Emergency contact Number</label>
                            <input type="number" name="" id="" class="form-control" placeholder="+1(555)987-6543">
                        </div> 

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">
                               I consent to the processing of my personal data in accordance with the privacy policy.
                            </label>
                        </div>

                        <div>
                            <center><button type="button" class="btn btn-primary">Register</button></center>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</body>

</html>
