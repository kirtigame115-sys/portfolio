<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .blur {
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-lg-6 shadow border">
                <h3>Vacation Request Form</h3>
                <p class="blur">Please fill out the form below to request your vacation time.</p>
                <form action="">
                    <div class="row">
                        <div class="col-lg-6 mb-3">
                            <label for="">First Name</label>
                            <input type="text" class="blur" value="Enter your first name" name="" id=""
                                class="form-control">
                        </div>
                        <div class="col-lg-6  mb-3">
                            <label for="">Last Name</label>
                            <input type="text" class="blur" value="Enter your last name" name="" id=""
                                class="form-control">
                        </div>
                        <div class="col-lg-12  mb-3">
                            <label for="">Email Address</label>
                            <input type="email" name="" id="" class="form-control"
                                placeholder="Enter your email address">
                        </div>
                        <div class="col-lg-6  mb-3">
                            <label for="">Phone Number</label>
                            <input type="number" name="" id="" class="form-control"
                                placeholder="Enter your phone number">
                        </div>

                        <div class="col-lg-6  mb-3">
                            <label class="form-label">Department</label>
                            <select class="form-select">
                                <option value="">select your department</option>
                                <option>Electronics and Telecommunication</option>
                                <option>computer</option>
                                <option>civil</option>
                                <option>Mechanical</option>
                                <option>Electrical</option>
                            </select>
                        </div>
                        <div class="col-lg-6  mb-3">
                            <label for="">Vacation start Date</label>
                            <input type="number" name="" id="" class="form-control" placeholder="DD/MM/YYYY">
                        </div>

                        <div class="col-lg-6  mb-3">
                            <label for="">Vacation End Date</label>
                            <input type="number" name="" id="" class="form-control" placeholder="DD/MM/YYYY">
                        </div>

                        <div class="col-lg-6  mb-3">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label for="">Vacation Type</label>

                            <label class="form-check-label" for="remember">Paid Time Off (PTO)</label>

                            <label class="form-check-label" for="remember"> Stick Leave</label>

                            <label class="form-check-label" for="remember">Unpaid Leave</label>
                        </div>


                        <div class="col-lg-12  mb-3">
                            <label for="">Reason for vacation</label>
                            <textarea type="number" name="" id="" class="form-control"
                                placeholder="Please enter a brief description of your reason for v..."></textarea>
                        </div>


                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">
                                I cerify that the information provided above is true and accuarate i agree to
                                abide by the company's policies and procedures.
                            </label>
                        </div>

                        <div>
                            <center><button type="button" class="btn btn-primary">Submit Request</button></center>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</body>

</html>
